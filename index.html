<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ワインログ">
<title>ワインジャーナル</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf9;
  --white: #ffffff;
  --surface: #f5f4f2;
  --border: #e8e5e0;
  --border-focus: #a0998f;
  --text: #1a1714;
  --text-secondary: #6b6560;
  --text-muted: #a09890;
  --accent: #7c3f2c;
  --accent-light: #f5ede9;
  --gold: #c0843a;
  --green: #2d6a4f;
  --green-light: #e8f5ee;
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

.app { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

/* TOP BAR */
.top-bar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding-top: env(safe-area-inset-top, 0px);
  position: sticky; top: 0; z-index: 20;
}
.top-bar-inner { display: flex; align-items: flex-start; justify-content: space-between; padding: 6px 16px 0; }
.top-bar h1 { font-family: 'Syne', sans-serif; font-size: 21px; font-weight: 400; color: var(--text); letter-spacing: -0.01em; }
.count-badge { font-size: 12px; color: var(--text-muted); background: var(--surface); border-radius: 100px; padding: 2px 8px; }
.tabs { display: flex; padding: 0 4px; }
.tab-btn { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; padding: 10px 4px; cursor: pointer; margin-bottom: -1px; transition: color 0.18s, border-color 0.18s; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

/* SECTIONS */
.section { display: none; }
.section.active { display: block; }
.scroll-area { padding: 20px; padding-bottom: calc(40px + env(safe-area-inset-bottom, 16px)); }

/* FORM */
.form-stack { display: flex; flex-direction: column; gap: 16px; }
.form-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
.form-input, .form-textarea { width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 400; padding: 12px 14px; outline: none; transition: border-color 0.18s, box-shadow 0.18s; -webkit-appearance: none; }
.form-input:focus, .form-textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(124,63,44,0.08); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); font-weight: 300; }
.form-textarea { resize: none; min-height: 84px; line-height: 1.6; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* AUTO FIELDS */
.auto-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.auto-field { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; display: flex; align-items: center; gap: 8px; }
.auto-field-icon { font-size: 15px; flex-shrink: 0; line-height: 1; }
.auto-field-text { flex: 1; min-width: 0; }
.auto-field-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); line-height: 1; margin-bottom: 3px; }
.auto-field-value { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.auto-field-value.dim { color: var(--text-muted); }

/* IMAGE UPLOAD */
.img-upload-area {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  background: var(--white);
  overflow: hidden;
  min-height: 76px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: border-color 0.18s;
}
.img-upload-area:active { border-color: var(--border-focus); }
.upload-placeholder { display: flex; align-items: center; gap: 12px; padding: 18px 20px; width: 100%; }
.upload-icon-wrap { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.upload-title { font-size: 14px; color: var(--text-secondary); }
.upload-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.img-upload-area img#img-preview { width: 100%; max-height: 240px; object-fit: contain; display: block; }
.img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; width: 100%; }
.img-grid-item { position: relative; aspect-ratio: 3/4; border-radius: var(--radius-xs); overflow: hidden; background: var(--surface); }
.img-grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-grid-item .remove-img { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.img-add-tile { aspect-ratio: 3/4; border-radius: var(--radius-xs); border: 1.5px dashed var(--border); background: var(--white); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--text-muted); font-size: 12px; }
.img-add-tile span { font-size: 20px; }

/* SCAN OVERLAY */
.scan-overlay { position: absolute; inset: 0; background: rgba(250,250,249,0.93); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.scan-spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.scan-text { font-size: 13px; color: var(--text-secondary); }

/* BANNERS */
.ai-banner { display: flex; align-items: flex-start; gap: 10px; background: var(--green-light); border: 1px solid rgba(45,106,79,0.2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--green); line-height: 1.5; }
.ai-banner-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.ai-error-banner { display: flex; align-items: center; gap: 10px; background: #fef3f2; border: 1px solid rgba(192,56,43,0.2); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: #c0392b; }

/* API KEY */
.api-key-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.api-key-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.api-key-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.api-key-status { font-size: 11px; padding: 2px 8px; border-radius: 100px; }
.api-key-status.set { background: var(--green-light); color: var(--green); }
.api-key-status.unset { background: var(--accent-light); color: var(--accent); }
.api-key-input-row { display: flex; gap: 8px; }
.api-key-input { flex: 1; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-xs); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 12px; outline: none; min-width: 0; }
.api-key-input:focus { border-color: var(--border-focus); }
.api-key-save-btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-xs); padding: 9px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.api-key-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }
.api-key-hint a { color: var(--accent); text-decoration: none; }
.api-key-change { font-size: 11px; color: var(--text-muted); text-decoration: underline; cursor: pointer; margin-top: 4px; display: inline-block; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; }

/* TYPE CHIPS */
.type-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.type-chip { padding: 8px 14px; border-radius: 100px; border: 1px solid var(--border); background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
.type-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

/* STARS */
.star-row { display: flex; align-items: center; }
.star-btn { background: none; border: none; font-size: 30px; line-height: 1; cursor: pointer; padding: 4px; color: var(--border); transition: color 0.12s, transform 0.1s; }
.star-btn.on { color: var(--gold); }
.star-btn:active { transform: scale(1.15); }
.star-hint { font-size: 12px; color: var(--text-muted); margin-left: 8px; }

/* BUTTONS */
.save-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.18s; margin-top: 4px; }
.save-btn:active { opacity: 0.82; }
.clear-btn { width: 100%; padding: 13px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text-muted); cursor: pointer; margin-top: 8px; }

/* LIST */
.list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.list-meta { font-size: 13px; color: var(--text-muted); }
.export-btn { font-size: 12px; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: 100px; padding: 5px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* SETTINGS */
.settings-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; margin-left: auto; flex-shrink: 0; }
.settings-btn:active { opacity: 0.6; }
.settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.28); z-index: 100; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.settings-overlay.open { display: flex; }
.settings-sheet { background: var(--white); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); width: 100%; max-width: 430px; padding: 0 20px calc(32px + env(safe-area-inset-bottom, 0px)); animation: sheetUp 0.28s cubic-bezier(0.32,0.72,0,1); }
.settings-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 16px; }
.wine-list { display: flex; flex-direction: column; gap: 10px; }
.wine-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; gap: 12px; cursor: pointer; transition: border-color 0.15s; }
.wine-card:active { border-color: var(--border-focus); background: var(--surface); }
.card-thumb { width: 44px; height: 60px; border-radius: var(--radius-xs); border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
.card-name-row { display: flex; align-items: baseline; gap: 6px; }
.card-name { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.card-vintage { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
.card-meta { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-stars { font-size: 12px; color: var(--gold); }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
.ctag { font-size: 10px; padding: 2px 7px; border-radius: 100px; border: 1px solid var(--border); color: var(--text-muted); }
.ctag.type { background: var(--accent-light); border-color: transparent; color: var(--accent); }
.empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
.empty-icon { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.4; }
.empty-state p { font-size: 14px; line-height: 1.7; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; }
.stat-num { font-family: 'Syne', sans-serif; font-size: 26px; color: var(--text); line-height: 1; margin-bottom: 4px; }
.stat-lbl { font-size: 11px; color: var(--text-muted); }
.ranking-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
.rank-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.rank-num { font-size: 13px; color: var(--text-muted); min-width: 16px; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-stars { font-size: 11px; color: var(--gold); margin-top: 2px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.28); z-index: 100; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.modal-overlay.open { display: flex; }
.modal-sheet { background: var(--white); border-radius: 20px 20px 0 0; border-top: 1px solid var(--border); width: 100%; max-width: 430px; max-height: 90dvh; overflow-y: auto; padding: 0 20px calc(32px + env(safe-area-inset-bottom, 0px)); animation: sheetUp 0.28s cubic-bezier(0.32,0.72,0,1); }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width: 32px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
.modal-wine-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 400; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.modal-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
.modal-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 16px; }
.detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 16px; }
.d-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
.d-value { font-size: 13px; color: var(--text); text-align: right; line-height: 1.5; }
.memo-block { background: var(--surface); border-radius: var(--radius-xs); padding: 12px 14px; margin-top: 14px; font-size: 14px; color: var(--text-secondary); line-height: 1.7; font-style: italic; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-edit { flex: 1; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-delete { padding: 14px 18px; background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: #c0392b; cursor: pointer; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="logo-wrap" style="display:flex;align-items:center;gap:12px;padding:10px 16px 0;justify-content:space-between;width:100%">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 90" height="56" style="display:block;overflow:visible">
          <text x="2" y="72" font-family="Georgia,'Times New Roman',serif" font-size="86" fill="#1A1A1A" letter-spacing="4" font-weight="400">Vinote</text>
          <circle cx="120" cy="77" r="4.5" fill="#5C1B2E"/>
        </svg>
        <button class="settings-btn" onclick="openSettings()" aria-label="設定" style="flex-shrink:0;margin-top:0">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn" onclick="switchTab('add')">記録</button>
      <button class="tab-btn" onclick="switchTab('list')">一覧</button>
      <button class="tab-btn" onclick="switchTab('stats')">統計</button>
    </div>
  </div>

  <!-- ADD -->
  <div id="tab-add" class="section">
    <div class="scroll-area">
      <div class="form-stack">

        <!-- Auto: date + GPS -->
        <div class="auto-row">
          <div class="auto-field" style="position:relative;cursor:pointer" onclick="document.getElementById('f-date').showPicker&&document.getElementById('f-date').showPicker()">
            <span class="auto-field-icon">📅</span>
            <div class="auto-field-text">
              <div class="auto-field-label">日付 <span style="font-weight:400;opacity:0.6">タップで変更</span></div>
              <div class="auto-field-value" id="display-date">—</div>
            </div>
            <input type="date" id="f-date" style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer" onchange="onDateChange(this.value)">
          </div>
          <div class="auto-field" onclick="retryGPS()" style="cursor:pointer">
            <span class="auto-field-icon">📍</span>
            <div class="auto-field-text">
              <div class="auto-field-label">場所</div>
              <div class="auto-field-value dim" id="display-location">取得中…</div>
            </div>
          </div>
        </div>

        <!-- Photo -->
        <div>
          <div class="form-label">
            ラベル写真
            <span style="font-size:10px;color:var(--green);text-transform:none;letter-spacing:0;font-weight:400"> AIが自動入力（1枚目）</span>
          </div>
          <div class="img-upload-area" id="upload-area" style="min-height:auto">
            <div id="img-grid-wrap" style="width:100%">
              <!-- 動的に生成 -->
            </div>
            <div class="scan-overlay" id="scan-overlay" style="display:none">
              <div class="scan-spinner"></div>
              <div class="scan-text">ラベルを解析中…</div>
            </div>
          </div>
          <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImg(event)">
        </div>

        <!-- AI result -->
        <div id="ai-banner" style="display:none"></div>

        <!-- Fields -->
        <div>
          <label class="form-label" for="f-name">ワイン名 *</label>
          <input class="form-input" id="f-name" type="text" placeholder="例：シャトー・マルゴー">
        </div>

        <div class="form-row">
          <div>
            <label class="form-label" for="f-producer">生産者</label>
            <input class="form-input" id="f-producer" type="text" placeholder="生産者名">
          </div>
          <div>
            <label class="form-label" for="f-vintage">ヴィンテージ</label>
            <input class="form-input" id="f-vintage" type="number" placeholder="2020" min="1900" max="2099" inputmode="numeric">
          </div>
        </div>

        <div class="form-row">
          <div>
            <label class="form-label" for="f-region">産地</label>
            <input class="form-input" id="f-region" type="text" placeholder="例：ボルドー">
          </div>
          <div>
            <label class="form-label" for="f-grape">品種</label>
            <input class="form-input" id="f-grape" type="text" placeholder="例：カベルネ">
          </div>
        </div>

        <div>
          <div class="form-label">種類</div>
          <div class="type-chips">
            <button class="type-chip" data-v="赤" onclick="selectType(this)">赤</button>
            <button class="type-chip" data-v="白" onclick="selectType(this)">白</button>
            <button class="type-chip" data-v="ロゼ" onclick="selectType(this)">ロゼ</button>
            <button class="type-chip" data-v="オレンジ" onclick="selectType(this)">オレンジ</button>
            <button class="type-chip" data-v="スパークリング" onclick="selectType(this)">スパークリング</button>
            <button class="type-chip" data-v="デザート" onclick="selectType(this)">デザート</button>
          </div>

                 msg.includes('API_KEY') || msg.includes('API_KEY_INVALID') ? 'APIキーを確認してください。' :

  }
}

function readAsBase64(file) {

    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// iPhoneの写真は大きすぎるのでCanvasで縮小してからAPIに送る
function resizeImage(dataUrl, maxPx = 1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

async function scanWithClaude(dataUrls, mimeType, apiKey) {

  const images = await Promise.all(

Return ONLY a JSON object: {"name":"wine name","producer":"producer name","vintage":"4-digit year or null"}
No markdown, no explanation.`;

  const step1Res = await fetch('https://vinote-proxy.yuto-119.workers.dev/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 256,
      messages: [{
        role: 'user',
        content: [
          ...images.map(b64 => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } })),
          { type: 'text', text: step1Prompt }
        ]
      }]
    })
  });

  if (!step1Res.ok) throw new Error(`HTTP ${step1Res.status}`);
  const step1Data = await step1Res.json();
  const step1Text = step1Data.text || step1Data.content?.map(c=>c.text||'').join('') || '';
  const step1Match = step1Text.match(/\{[\s\S]*\}/);
  if (!step1Match) throw new Error('Step1 parse error: ' + step1Text.slice(0,100));
  const step1 = JSON.parse(step1Match[0]);

  if (!step1.name) throw new Error('ワイン名を読み取れませんでした');

  // Step2: Web検索で詳細情報を補完
  updateScanText('Web検索で情報を補完中…');
  const searchQuery = [step1.producer, step1.name, step1.vintage].filter(Boolean).join(' ');
  const step2Prompt = `Search the web for "${searchQuery}" wine and return detailed information as JSON.

Return ONLY this JSON object with no markdown or explanation:
{
  "name": "wine proper name in original language",
  "producer": "producer/winery name",
  "vintage": "4-digit year or null",
  "region": "specific region (e.g. Pauillac, Bordeaux, France)",
  "grape": "grape variety or blend",
  "type": "must be one of: 赤,白,ロゼ,オレンジ,スパークリング,デザート"
}`;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 30000);
  let step2Res;
  try {
    step2Res = await fetch('https://vinote-proxy.yuto-119.workers.dev/', {
      method: 'POST',
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        messages: [{ role: 'user', content: step2Prompt }]
      })
    });
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('timeout');
    throw e;
  } finally {
    clearTimeout(timer);
  }

  if (!step2Res.ok) {
    const err = await step2Res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${step2Res.status}`);
  }

  const step2Data = await step2Res.json();
  const step2Text = step2Data.text || '';
  const step2Match = step2Text.match(/\{[\s\S]*\}/);
  if (!step2Match) {
    // Web検索結果が得られなかった場合はStep1の結果だけ返す
    return { name: step1.name, producer: step1.producer, vintage: step1.vintage, region: null, grape: null, type: null };
  }
  return JSON.parse(step2Match[0]);

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 30000);
  let res;
  try {
    res = await fetch('https://vinote-proxy.yuto-119.workers.dev/', {
      method: 'POST',
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',

      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',

function applyAIResult(result) {
  const fieldMap = { name:'f-name', producer:'f-producer', vintage:'f-vintage', region:'f-region', grape:'f-grape' };
  const labelMap = { name:'ワイン名', producer:'生産者', vintage:'ヴィンテージ', region:'産地', grape:'品種', type:'種類' };
  const filled = [];

  Object.entries(fieldMap).forEach(([key, id]) => {
    if (result[key]) { document.getElementById(id).value = result[key]; filled.push(key); }
  });

  const validTypes = ['赤','白','ロゼ','オレンジ','スパークリング','デザート'];
  if (result.type && validTypes.includes(result.type)) {
    wineType = result.type;
    document.querySelectorAll('.type-chip').forEach(c => c.classList.toggle('selected', c.dataset.v === wineType));
    filled.push('type');
  }

  if (filled.length) {
    showBanner('success', `${filled.map(f => labelMap[f]).join('、')}を読み取りました。内容を確認・補完してください。`);
  } else {
    showBanner('error', 'ラベルから情報を読み取れませんでした。手入力してください。');
  }
}

  const el = document.getElementById('ai-banner');
  el.className = type === 'success' ? 'ai-banner' : 'ai-error-banner';
  el.innerHTML = `<span class="ai-banner-icon">${type === 'success' ? '✨' : '⚠️'}</span><span>${msg}</span>`;
  el.style.display = 'flex';
}

  document.getElementById('list-meta').textContent = wines.length ? wines.length + '本' : '';
  if (!wines.length) {
    el.innerHTML = `<div class="empty-state"><span class="empty-icon">🍷</span><p>まだ記録がありません<br>「新しく記録」から追加しましょう</p></div>`;
    return;
  }
  el.innerHTML = wines.map(w => `
    <div class="wine-card" onclick="showDetail(${w.id})">
      <div class="card-thumb">${(w.imgs&&w.imgs[0])||w.img ? `<img src="${(w.imgs&&w.imgs[0])||w.img}" alt="">` : '🍷'}</div>
      <div class="card-info">
        <div class="card-name-row">
          <div class="card-name">${esc(w.name)}</div>
          ${w.vintage ? `<span class="card-vintage">${w.vintage}</span>` : ''}
        </div>
        ${w.score ? `<div class="card-stars">${'★'.repeat(w.score)}${'☆'.repeat(5-w.score)}</div>` : ''}
        <div class="card-meta">${[w.location, w.date].filter(Boolean).join(' · ')}</div>
        <div class="card-tags">
          ${w.type ? `<span class="ctag type">${esc(w.type)}</span>` : ''}
          ${w.price ? `<span class="ctag">¥${parseInt(w.price).toLocaleString()}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function updateBadge() {
  // バッジ非表示
}

// ── DETAIL ──
function showDetail(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  const rows = [
    ['生産者',w.producer],['ヴィンテージ',w.vintage],['産地',w.region],
    ['品種',w.grape],['種類',w.type],['飲んだ日',w.date],
    ['場所',w.location],['価格',w.price?'¥'+parseInt(w.price).toLocaleString():''],
    ['評価',w.score?'★'.repeat(w.score)+'☆'.repeat(5-w.score):'']
  ].filter(([,v])=>v);
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-wine-name">${esc(w.name)}</div>
    <div class="modal-sub">${[w.type, w.vintage?w.vintage+'年':''].filter(Boolean).join(' · ')||'&nbsp;'}</div>
    ${(w.imgs&&w.imgs.length)?w.imgs.map(src=>`<img class="modal-img" src="${src}" alt="" style="margin-bottom:8px">`).join(''):(w.img?`<img class="modal-img" src="${w.img}" alt="">`:'') }
    ${rows.map(([l,v])=>`<div class="detail-row"><span class="d-label">${l}</span><span class="d-value">${esc(String(v))}</span></div>`).join('')}
    ${w.memo?`<div class="memo-block">${esc(w.memo)}</div>`:''}
    <div class="modal-btns">
      <button class="btn-edit" onclick="editWine(${w.id})">編集する</button>
      <button class="btn-delete" onclick="deleteWine(${w.id})">削除</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function handleOverlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function deleteWine(id) {
  if (!confirm('この記録を削除しますか？')) return;
  wines = wines.filter(x => x.id !== id);
  persist(); sbDelete(id); updateBadge(); closeModal(); renderList();
}

function editWine(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  closeModal();
  document.getElementById('f-name').value = w.name;
  if (w.date) setDateValue(w.date);
  document.getElementById('f-producer').value = w.producer||'';
  document.getElementById('f-vintage').value = w.vintage||'';
  document.getElementById('f-region').value = w.region||'';
  document.getElementById('f-grape').value = w.grape||'';
  document.getElementById('f-price').value = w.price||'';
  document.getElementById('f-memo').value = w.memo||'';
  wineType = w.type||'';
  document.querySelectorAll('.type-chip').forEach(c => c.classList.toggle('selected', c.dataset.v===wineType));
  score = w.score||0;
  document.querySelectorAll('#star-row .star-btn').forEach(b => b.classList.toggle('on', parseInt(b.dataset.v)<=score));
  document.getElementById('star-hint').textContent = score ? SCORE_LABELS[score] : '未評価';
  imgData = w.imgs ? [...w.imgs] : (w.img ? [w.img] : []);
  renderImgGrid();
  editId = w.id;
  switchTab('add');
}

// ── STATS ──
function renderStats() {
  const total = wines.length;
  const scored = wines.filter(w => w.score);
  const avg = scored.length ? (scored.reduce((s,w)=>s+w.score,0)/scored.length).toFixed(1) : '—';
  const priced = wines.filter(w => w.price);
  const avgP = priced.length ? Math.round(priced.reduce((s,w)=>s+parseInt(w.price),0)/priced.length) : null;
  const types = {};
  wines.forEach(w => { if (w.type) types[w.type]=(types[w.type]||0)+1; });
  const topType = Object.entries(types).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">記録本数</div></div>
    <div class="stat-card"><div class="stat-num">${avg}</div><div class="stat-lbl">平均評価</div></div>
    <div class="stat-card"><div class="stat-num">${topType?topType[0]:'—'}</div><div class="stat-lbl">よく飲む種類</div></div>
    <div class="stat-card"><div class="stat-num">${avgP?'¥'+avgP.toLocaleString():'—'}</div><div class="stat-lbl">平均価格</div></div>
  `;
  const ranked = wines.filter(w=>w.score).sort((a,b)=>b.score-a.score).slice(0,5);
  document.getElementById('stats-ranking').innerHTML = ranked.length ? `
    <div class="ranking-label">評価の高いワイン</div>
    ${ranked.map((w,i)=>`
      <div class="rank-item">
        <span class="rank-num">${i+1}</span>
        <div class="rank-info">
          <div class="rank-name">${esc(w.name)}${w.vintage?' '+w.vintage:''}</div>
          <div class="rank-stars">${'★'.repeat(w.score)}</div>
        </div>
      </div>`).join('')}
  ` : (!total?`<div class="empty-state" style="padding:40px 0"><p style="font-size:13px">記録を追加すると統計が表示されます</p></div>`:'');
}

// ── CSV ──
function exportCSV() {
  if (!wines.length) { alert('記録がありません'); return; }
  const h = ['ワイン名','生産者','ヴィンテージ','産地','品種','種類','飲んだ日','場所','価格','評価','テイスティングメモ'];
  const rows = wines.map(w =>
    [w.name,w.producer,w.vintage,w.region,w.grape,w.type,w.date,w.location,w.price,w.score,w.memo]
    .map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`)
    .join(',')
  );
  const csv = '\uFEFF' + [h.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'wine-journal.csv';
  a.click();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SETTINGS ──
function openSettings() { document.getElementById('settings-overlay').classList.add('open'); }
function handleSettingsClick(e) { if (e.target === document.getElementById('settings-overlay')) document.getElementById('settings-overlay').classList.remove('open'); }

// ── INIT ──
load(); // localStorageからまず読み込み
sbLoad().then(() => { renderList(); }); // Supabaseで上書き
updateBadge();
updateApiKeyUI();
switchTab('add');
initAuto();
renderImgGrid();
</script>
